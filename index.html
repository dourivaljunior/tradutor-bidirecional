<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tradutor de Painel - Modo Carro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0c;
            color: #ffffff;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }

        .box {
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 6px solid;
            transition: all 0.3s;
        }

        .box-pt { border-color: #34c759; }
        .box-en { border-color: #ff9500; }

        .lang-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 12px;
        }

        .content {
            font-size: 22px;
            font-weight: 500;
            line-height: 1.3;
            word-break: break-word;
            min-height: 70px;
        }

        .controls {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #micBtn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #007aff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.4);
        }

        #micBtn.listening {
            background: #ff3b30;
            transform: scale(1.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .hint {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            margin-top: 16px;
        }

        .status {
            position: fixed;
            top: 16px;
            right: 16px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .dot.active {
            background: #34c759;
            box-shadow: 0 0 5px #34c759;
        }

        .error-message {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid #ff3b30;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            text-align: center;
            font-size: 13px;
            color: #ff6b6b;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="status">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">VERIFICANDO...</span>
    </div>

    <div class="container">
        <h1>🎤 TRADUTOR DE PAINEL</h1>

        <div class="box box-pt">
            <div class="lang-label">🇧🇷 PORTUGUÊS (MOTORISTA)</div>
            <div id="text-pt" class="content">...</div>
        </div>

        <div class="box box-en">
            <div class="lang-label">🇺🇸 ENGLISH (PASSENGER)</div>
            <div id="text-en" class="content">...</div>
        </div>

        <div class="controls">
            <button id="micBtn">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" x2="12" y1="19" y2="22"/>
                </svg>
            </button>
        </div>
        <div id="hint" class="hint">🎤 Toque no microfone e fale</div>
    </div>

    <div id="error-container"></div>

    <script src="config.js"></script>
    <script>
        (function() {
            console.log("🚀 Iniciando aplicação...");
            
            // Elementos DOM
            const micBtn = document.getElementById('micBtn');
            const hintEl = document.getElementById('hint');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const textPt = document.getElementById('text-pt');
            const textEn = document.getElementById('text-en');
            const errorContainer = document.getElementById('error-container');
            
            let isProcessing = false;
            let currentUtterance = null;
            
            // Modelo correto e suportado pela Groq
            const GROQ_MODEL = "llama-3.3-70b-versatile";
            
            // ============================================
            // 1. VERIFICAÇÃO DA API KEY
            // ============================================
            function checkApiKey() {
                if (typeof GROQ_API_KEY !== 'undefined' && GROQ_API_KEY && GROQ_API_KEY.startsWith('gsk_')) {
                    statusDot.classList.add('active');
                    statusText.innerText = "GROQ ONLINE";
                    console.log("✅ API key válida");
                    return true;
                } else {
                    statusDot.classList.remove('active');
                    statusText.innerText = "⚠️ API KEY INVÁLIDA";
                    showError("❌ Chave API inválida ou não configurada. Crie o arquivo config.js com: const GROQ_API_KEY = 'sua_chave';");
                    console.error("❌ API key inválida:", typeof GROQ_API_KEY);
                    return false;
                }
            }
            
            // ============================================
            // 2. EXIBIR ERROS
            // ============================================
            function showError(msg) {
                errorContainer.innerHTML = `<div class="error-message">⚠️ ${msg}</div>`;
                setTimeout(() => {
                    if (errorContainer.firstChild) errorContainer.innerHTML = '';
                }, 5000);
            }
            
            // ============================================
            // 3. FUNÇÃO DE TRADUÇÃO (GROQ API)
            // ============================================
            async function translateText(text, targetLang) {
                console.log(`📝 Traduzindo: "${text}" para ${targetLang}`);
                
                const systemPrompt = targetLang === 'en' 
                    ? "You are a professional translator. Translate the following Portuguese text to English. Return ONLY the translated text, no explanations, no quotes, no extra characters, no markdown."
                    : "You are a professional translator. Translate the following English text to Portuguese (Brazil). Return ONLY the translated text, no explanations, no quotes, no extra characters, no markdown.";
                
                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${GROQ_API_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: GROQ_MODEL,
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: text }
                            ],
                            temperature: 0.3,
                            max_tokens: 500
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    let translatedText = data.choices[0].message.content.trim();
                    
                    // Limpar possíveis markdown ou aspas extras
                    translatedText = translatedText.replace(/^["']|["']$/g, '');
                    translatedText = translatedText.replace(/^```\w*\n?|```$/g, '');
                    
                    console.log(`✅ Tradução recebida: "${translatedText}"`);
                    return translatedText;
                    
                } catch (error) {
                    console.error("❌ Erro na tradução:", error);
                    throw error;
                }
            }
            
            // ============================================
            // 4. FUNÇÃO DE FALA (TTS)
            // ============================================
            function speakText(text, lang) {
                if (currentUtterance) {
                    window.speechSynthesis.cancel();
                }
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang === 'en' ? 'en-US' : 'pt-BR';
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                
                utterance.onstart = () => console.log(`🔊 Falando: "${text.substring(0, 50)}..."`);
                utterance.onend = () => console.log("🔇 Fala finalizada");
                utterance.onerror = (e) => console.error("❌ Erro na fala:", e);
                
                currentUtterance = utterance;
                window.speechSynthesis.speak(utterance);
            }
            
            // ============================================
            // 5. PROCESSAMENTO PRINCIPAL
            // ============================================
            async function processTranslation(originalText, sourceLang) {
                if (isProcessing) {
                    showError("Aguarde a tradução anterior terminar...");
                    return;
                }
                
                isProcessing = true;
                hintEl.innerHTML = "🔄 Traduzindo... <span class='loading-spinner'></span>";
                
                try {
                    let translatedText;
                    
                    if (sourceLang === 'pt') {
                        // Português → Inglês
                        translatedText = await translateText(originalText, 'en');
                        textEn.innerHTML = translatedText;
                        textPt.innerHTML = originalText;
                        speakText(translatedText, 'en');
                    } else {
                        // Inglês → Português
                        translatedText = await translateText(originalText, 'pt');
                        textPt.innerHTML = translatedText;
                        textEn.innerHTML = originalText;
                        speakText(translatedText, 'pt');
                    }
                    
                    hintEl.innerHTML = "✅ Tradução concluída! Toque no microfone para falar novamente.";
                    setTimeout(() => {
                        if (!micBtn.classList.contains('listening') && !isProcessing) {
                            hintEl.innerHTML = "🎤 Toque no microfone e fale";
                        }
                    }, 3000);
                    
                } catch (error) {
                    console.error("❌ Erro no processamento:", error);
                    showError(`Erro na tradução: ${error.message}`);
                    hintEl.innerHTML = "❌ Erro na tradução. Tente novamente.";
                    
                    if (sourceLang === 'pt') {
                        textEn.innerHTML = "[Erro na tradução]";
                    } else {
                        textPt.innerHTML = "[Erro na tradução]";
                    }
                } finally {
                    isProcessing = false;
                }
            }
            
            // ============================================
            // 6. DETECÇÃO DE IDIOMA
            // ============================================
            function detectLanguage(text) {
                // Padrões de português
                const portuguesePattern = /[áâãàéêíóôõúç]/i;
                const commonPtWords = /\b(o|a|os|as|um|uma|uns|umas|de|do|da|dos|das|em|com|para|por|que|e|ou|mas|se|eu|você|ele|ela|nós|eles|elas|meu|sua|nosso|deles)\b/i;
                const ptQuestions = /^(qual|quem|onde|quando|como|por que|pra que|o que)/i;
                
                if (portuguesePattern.test(text) || commonPtWords.test(text) || ptQuestions.test(text)) {
                    return 'pt';
                }
                return 'en';
            }
            
            // ============================================
            // 7. RECONHECIMENTO DE FALA
            // ============================================
            function initSpeechRecognition() {
                const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
                
                if (!SpeechRecognitionAPI) {
                    showError("Seu navegador não suporta reconhecimento de fala. Use Chrome, Edge ou Safari.");
                    hintEl.innerHTML = "❌ Navegador não suportado";
                    return false;
                }
                
                const recognition = new SpeechRecognitionAPI();
                recognition.lang = 'pt-BR';
                recognition.interimResults = false;
                recognition.continuous = false;
                recognition.maxAlternatives = 1;
                
                micBtn.onclick = () => {
                    if (isProcessing) {
                        showError("Aguarde a tradução atual terminar...");
                        return;
                    }
                    
                    try {
                        recognition.start();
                        micBtn.classList.add('listening');
                        hintEl.innerHTML = "🎤 Ouvindo... Fale claramente";
                        console.log("🎙️ Reconhecimento iniciado");
                    } catch (e) {
                        console.error("❌ Erro ao iniciar:", e);
                        hintEl.innerHTML = "❌ Erro no microfone";
                        micBtn.classList.remove('listening');
                        showError("Não foi possível acessar o microfone. Verifique as permissões.");
                    }
                };
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    console.log(`🎤 Texto reconhecido: "${transcript}"`);
                    
                    const detectedLang = detectLanguage(transcript);
                    console.log(`🌐 Idioma detectado: ${detectedLang.toUpperCase()}`);
                    
                    processTranslation(transcript, detectedLang);
                };
                
                recognition.onerror = (event) => {
                    console.error("❌ Erro no reconhecimento:", event.error);
                    micBtn.classList.remove('listening');
                    
                    if (event.error === 'not-allowed') {
                        hintEl.innerHTML = "❌ Permissão do microfone negada";
                        showError("Permissão do microfone negada. Verifique as configurações do navegador.");
                    } else if (event.error === 'no-speech') {
                        hintEl.innerHTML = "🎤 Nada foi detectado. Tente novamente.";
                    } else {
                        hintEl.innerHTML = "🎤 Toque no microfone e fale";
                    }
                };
                
                recognition.onend = () => {
                    micBtn.classList.remove('listening');
                    if (!isProcessing && hintEl.innerHTML.includes("Ouvindo")) {
                        hintEl.innerHTML = "🎤 Toque no microfone e fale";
                    }
                    console.log("🎙️ Reconhecimento finalizado");
                };
                
                return true;
            }
            
            // ============================================
            // 8. INICIALIZAÇÃO
            // ============================================
            function init() {
                console.log("🔧 Inicializando...");
                console.log(`🤖 Modelo Groq: ${GROQ_MODEL}`);
                
                if (!checkApiKey()) {
                    return;
                }
                
                const speechSupported = initSpeechRecognition();
                if (!speechSupported) {
                    showError("Reconhecimento de fala não disponível neste navegador.");
                }
                
                // Carregar vozes disponíveis
                if (window.speechSynthesis) {
                    window.speechSynthesis.onvoiceschanged = () => {
                        console.log("🔊 Vozes carregadas:", window.speechSynthesis.getVoices().length);
                    };
                }
            }
            
            // Aguarda o DOM carregar completamente
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
